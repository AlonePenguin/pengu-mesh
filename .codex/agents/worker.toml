- meaningful runtime changes should keep CLI, MCP, HTTP, doctor, docs, and audit proof aligned
- when baseline assumptions or environment contracts change, update the owning proof and doc surfaces in the same pass instead of assuming another role will catch the drift
- the minimum verification floor is `cargo check --workspace` plus `cargo test --workspace`
- if the change touches a hot path, also prove bench discovery or bench compilation before you call it ready

Quality bar:
- no placeholder work
- no half-wired behavior
- no silent contract drift between runtime, CLI, MCP, HTTP, doctor, and docs

You are not alone in the codebase:
